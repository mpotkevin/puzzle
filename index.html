<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自製拼圖產生器 - 鄭凱文職能治療師設計</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f1f5f9;
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
        }

        .custom-shadow {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        /* 加大滑桿，方便長者操作 */
        input[type="range"] {
            height: 12px;
            -webkit-appearance: none;
            background: #cbd5e1;
            border-radius: 10px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: var(--primary);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: all 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        /**
         * 穩定且置中的 SVG 圖標組件
         */
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                puzzle: <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />,
                puzzlePiece: <path d="M11.75 5.25c.7-.7 1.8-.7 2.5 0l2 2c.7.7.7 1.8 0 2.5l-1 1c-.7.7-.7 1.8 0 2.5l3 3c.7.7.7 1.8 0 2.5l-2 2c-.7.7-1.8.7-2.5 0l-3-3c-.7-.7-1.8-.7-2.5 0l-1 1c-.7.7-1.8.7-2.5 0l-2-2c-.7-.7-.7-1.8 0-2.5l1-1c.7-.7.7-1.8 0-2.5l-3-3c-.7-.7-.7-1.8 0-2.5l2-2c.7-.7 1.8-.7 2.5 0l3 3c.7.7 1.8.7 2.5 0l1-1z" />,
                image: <path d="M5 19l4.58-4.59a2 2 0 012.83 0L17 19M11 11a2 2 0 100-4 2 2 0 000 4zM19 5H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2V7a2 2 0 00-2-2z" />,
                upload: <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
                refresh: <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />,
                download: <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" />,
                arrowRight: <path d="M5 12h14M12 5l7 7-7 7" />,
                trash: <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
            };

            return (
                <svg
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2.5"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={`flex-shrink-0 ${className}`}
                    style={{ display: 'block' }}
                >
                    {icons[name] || icons.puzzle}
                </svg>
            );
        };

        const App = () => {
            const [image, setImage] = useState(null);
            const [rows, setRows] = useState(3);
            const [cols, setCols] = useState(4);
            const [lineWidth, setLineWidth] = useState(3);
            const [style, setStyle] = useState('irregular'); 
            const [previewTab, setPreviewTab] = useState('puzzle'); 
            const [isExporting, setIsExporting] = useState(false);
            const [isJsPdfLoaded, setIsJsPdfLoaded] = useState(false);
            const [randomSeed, setRandomSeed] = useState(Math.random());
            const [canvasSize, setCanvasSize] = useState({ width: 800, height: 600 });

            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const script = document.createElement('script');
                script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
                script.async = true;
                script.onload = () => setIsJsPdfLoaded(true);
                document.body.appendChild(script);
            }, []);

            const updateDimensions = useCallback((img) => {
                if (!img) return;
                const container = document.getElementById('main-container');
                const availableW = container ? container.clientWidth - 48 : window.innerWidth - 32;
                const availableH = container ? container.clientHeight - 120 : 600;
                
                const ratio = img.height / img.width;
                let finalW = Math.min(1000, availableW);
                let finalH = finalW * ratio;

                if (finalH > availableH && container) {
                    finalH = availableH;
                    finalW = finalH / ratio;
                }

                setCanvasSize({ width: finalW, height: finalH });
            }, []);

            const handleUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const img = new Image();
                        img.onload = () => {
                            setImage(img);
                            updateDimensions(img);
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            const points = useMemo(() => {
                const pts = [];
                const jitter = style === 'irregular' ? 0.35 : 0;
                for (let i = 0; i <= rows; i++) {
                    pts[i] = [];
                    for (let j = 0; j <= cols; j++) {
                        let x = j / cols;
                        let y = i / rows;
                        const getNoise = (a, b, off) => {
                            const v = Math.sin(a * 12.9898 + b * 78.233 + (randomSeed + off) * 43758.5453);
                            return v - Math.floor(v);
                        };
                        if (style === 'irregular') {
                            if (i > 0 && i < rows && j > 0 && j < cols) {
                                x += (getNoise(i, j, 0) - 0.5) * (jitter / cols);
                                y += (getNoise(j, i, 0.5) - 0.5) * (jitter / rows);
                            } else if (i === 0 || i === rows) {
                                if (j > 0 && j < cols) x += (getNoise(i, j, 0.2) - 0.5) * (jitter * 0.5 / cols);
                            } else if (j === 0 || j === cols) {
                                if (i > 0 && i < rows) y += (getNoise(j, i, 0.7) - 0.5) * (jitter * 0.5 / rows);
                            }
                        }
                        pts[i][j] = { x, y };
                    }
                }
                return pts;
            }, [rows, cols, style, randomSeed]);

            const draw = useCallback((ctx, w, h, mode) => {
                ctx.clearRect(0, 0, w, h);
                const isGuide = mode === 'guide';
                if (!isGuide && image) {
                    ctx.drawImage(image, 0, 0, w, h);
                } else {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, w, h);
                }
                ctx.strokeStyle = isGuide ? '#94a3b8' : '#000000';
                ctx.lineWidth = lineWidth;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                for (let i = 0; i <= rows; i++) {
                    for (let j = 0; j <= cols; j++) {
                        if (j < cols) {
                            ctx.moveTo(points[i][j].x * w, points[i][j].y * h);
                            ctx.lineTo(points[i][j+1].x * w, points[i][j+1].y * h);
                        }
                        if (i < rows) {
                            ctx.moveTo(points[i][j].x * w, points[i][j].y * h);
                            ctx.lineTo(points[i+1][j].x * w, points[i+1][j].y * h);
                        }
                    }
                }
                ctx.stroke();
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = lineWidth * 1.5;
                ctx.strokeRect(0, 0, w, h);
            }, [image, points, lineWidth, rows, cols]);

            useEffect(() => {
                if (canvasRef.current && image) {
                    const ctx = canvasRef.current.getContext('2d');
                    draw(ctx, canvasSize.width, canvasSize.height, previewTab);
                }
            }, [image, canvasSize, previewTab, draw]);

            const exportPDF = async (mode) => {
                if (!image || !isJsPdfLoaded) return;
                setIsExporting(true);
                setTimeout(() => {
                    try {
                        const { jsPDF } = window.jspdf;
                        const orientation = image.width > image.height ? 'l' : 'p';
                        const pdf = new jsPDF(orientation, 'mm', 'a4');
                        const pw = pdf.internal.pageSize.getWidth();
                        const ph = pdf.internal.pageSize.getHeight();
                        const margin = 12;
                        const titleH = 15;
                        const drawPage = (type, title) => {
                            const temp = document.createElement('canvas');
                            const q = 2.5; // 極高品質
                            temp.width = image.width * q;
                            temp.height = image.height * q;
                            draw(temp.getContext('2d'), temp.width, temp.height, type);
                            const ratio = Math.min((pw - margin*2) / image.width, (ph - margin*2 - titleH) / image.height);
                            const finalW = image.width * ratio;
                            const finalH = image.height * ratio;
                            const x = (pw - finalW) / 2;
                            const y = margin + titleH + (ph - margin*2 - titleH - finalH) / 2;
                            pdf.setFontSize(16);
                            pdf.text(title, pw/2, margin + 8, { align: 'center' });
                            pdf.addImage(temp.toDataURL('image/jpeg', 0.95), 'JPEG', x, y, finalW, finalH);
                        };
                        if (mode === 'both' || mode === 'puzzle') {
                            drawPage('puzzle', '拼圖練習頁面');
                            if (mode === 'both') pdf.addPage();
                        }
                        if (mode === 'both' || mode === 'guide') {
                            drawPage('guide', '引導底圖頁面');
                        }
                        pdf.save(`自製拼圖_${cols}x${rows}_${Date.now()}.pdf`);
                    } catch (e) {
                        console.error(e);
                    } finally {
                        setIsExporting(false);
                    }
                }, 100);
            };

            return (
                <div className="min-h-screen flex flex-col lg:flex-row overflow-hidden">
                    {/* 控制欄：在電腦端固定左側，手機端在上方 */}
                    <aside className="w-full lg:w-96 bg-white border-b lg:border-r border-slate-200 flex flex-col z-10 overflow-y-auto max-h-screen shadow-xl">
                        <div className="p-6 md:p-8 space-y-8">
                            <header className="flex items-center gap-4">
                                <div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                    <Icon name="puzzlePiece" size={32} />
                                </div>
                                <h1 className="font-black text-2xl md:text-3xl tracking-tight text-slate-800">自製拼圖產生器</h1>
                            </header>

                            {/* 1. 上傳圖片 */}
                            <section className="space-y-4">
                                <div className="flex items-center justify-between">
                                    <label className="text-lg md:text-xl font-black text-slate-700 flex items-center gap-2">
                                        <Icon name="image" size={24} className="text-indigo-600" /> 1. 選取圖片
                                    </label>
                                    {image && (
                                        <button onClick={() => setImage(null)} className="text-red-500 font-bold flex items-center gap-1 hover:bg-red-50 px-3 py-1 rounded-lg transition-all text-base">
                                            <Icon name="trash" size={18} /> 清除
                                        </button>
                                    )}
                                </div>
                                {!image ? (
                                    <div 
                                        onClick={() => fileInputRef.current.click()}
                                        className="border-4 border-dashed border-slate-200 rounded-3xl p-10 md:p-14 flex flex-col items-center justify-center gap-4 cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition-all group active:scale-95"
                                    >
                                        <Icon name="upload" size={48} className="text-slate-300 group-hover:text-indigo-500 transition-colors" />
                                        <span className="text-lg md:text-xl text-slate-500 font-black">點擊這裡選取照片</span>
                                    </div>
                                ) : (
                                    <div className="relative group rounded-3xl overflow-hidden shadow-lg border-4 border-white">
                                        <img src={image.src} className="w-full h-32 md:h-40 object-cover" />
                                        <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all">
                                            <button onClick={() => fileInputRef.current.click()} className="bg-white text-slate-900 font-black px-6 py-3 rounded-full text-lg shadow-xl">更換照片</button>
                                        </div>
                                    </div>
                                )}
                                <input ref={fileInputRef} type="file" className="hidden" accept="image/*" onChange={handleUpload} />
                            </section>

                            {/* 2. 參數設定 */}
                            <section className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 space-y-8">
                                <div className="flex items-center justify-between">
                                    <label className="text-lg md:text-xl font-black text-slate-700 flex items-center gap-2">
                                        <Icon name="puzzle" size={24} className="text-indigo-600" /> 2. 設定切割方式
                                    </label>
                                    <button onClick={() => setRandomSeed(Math.random())} className="p-3 bg-white rounded-2xl shadow-md text-indigo-600 hover:scale-110 active:rotate-90 transition-all">
                                        <Icon name="refresh" size={24} />
                                    </button>
                                </div>
                                
                                <div className="flex p-2 bg-white rounded-2xl border-2 border-slate-100">
                                    <button onClick={() => setStyle('grid')} className={`flex-1 py-4 text-lg font-black rounded-xl transition-all ${style === 'grid' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-600'}`}>標準網格</button>
                                    <button onClick={() => setStyle('irregular')} className={`flex-1 py-4 text-lg font-black rounded-xl transition-all ${style === 'irregular' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-600'}`}>隨機斜線</button>
                                </div>

                                <div className="space-y-8 pt-2">
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-end">
                                            <span className="text-lg font-black text-slate-500">橫向切割數</span>
                                            <span className="text-3xl font-black text-indigo-600 leading-none">{cols}</span>
                                        </div>
                                        <input type="range" min="1" max="10" value={cols} onChange={e => setCols(parseInt(e.target.value))} className="w-full" />
                                    </div>
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-end">
                                            <span className="text-lg font-black text-slate-500">縱向切割數</span>
                                            <span className="text-3xl font-black text-indigo-600 leading-none">{rows}</span>
                                        </div>
                                        <input type="range" min="1" max="10" value={rows} onChange={e => setRows(parseInt(e.target.value))} className="w-full" />
                                    </div>
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-end">
                                            <span className="text-lg font-black text-slate-500">切割線粗細</span>
                                            <span className="text-2xl font-black text-indigo-600 leading-none">{lineWidth}px</span>
                                        </div>
                                        <input type="range" min="1" max="10" value={lineWidth} onChange={e => setLineWidth(parseInt(e.target.value))} className="w-full" />
                                    </div>
                                </div>
                            </section>

                            {/* 3. 下載按鈕 */}
                            <div className="pt-4 pb-8 space-y-4">
                                <button 
                                    disabled={!image || isExporting}
                                    onClick={() => exportPDF('both')}
                                    className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl flex items-center justify-center gap-3 hover:bg-black active:scale-95 disabled:opacity-30 disabled:pointer-events-none transition-all shadow-2xl"
                                >
                                    <Icon name="download" size={28} /> 下載列印 PDF (兩頁)
                                </button>
                                <div className="text-center">
                                    <p className="text-sm font-bold text-slate-400">設計：鄭凱文 職能治療師</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* 右側：預覽區 */}
                    <main id="main-container" className="flex-1 p-4 md:p-10 lg:p-16 flex flex-col items-center justify-center relative overflow-hidden">
                        {image ? (
                            <div className="w-full h-full flex flex-col items-center gap-8 md:gap-12 animate-in fade-in duration-500">
                                {/* 切換頁籤 */}
                                <div className="bg-white/60 backdrop-blur-md p-2 rounded-[2rem] flex shadow-lg border border-white/50 w-full max-w-md">
                                    <button onClick={() => setPreviewTab('puzzle')} className={`flex-1 py-4 px-6 rounded-2xl text-lg md:text-xl font-black transition-all flex items-center justify-center gap-2 ${previewTab === 'puzzle' ? 'bg-indigo-600 text-white shadow-xl' : 'text-slate-500 hover:text-slate-700'}`}>拼圖預覽</button>
                                    <button onClick={() => setPreviewTab('guide')} className={`flex-1 py-4 px-6 rounded-2xl text-lg md:text-xl font-black transition-all flex items-center justify-center gap-2 ${previewTab === 'guide' ? 'bg-white bg-indigo-600 text-white shadow-xl' : 'text-slate-500 hover:text-slate-700'}`}>引導底圖</button>
                                </div>
                                
                                {/* 畫布容器 */}
                                <div className="relative flex-1 flex items-center justify-center w-full max-h-[70vh]">
                                    <div className="bg-white p-4 md:p-6 rounded-[2.5rem] custom-shadow border-[12px] border-white transition-all transform hover:scale-[1.02]">
                                        <canvas 
                                            ref={canvasRef} 
                                            width={canvasSize.width} 
                                            height={canvasSize.height}
                                            className="rounded-2xl overflow-hidden block mx-auto max-w-full h-auto shadow-inner"
                                        />
                                    </div>
                                    
                                    {isExporting && (
                                        <div className="absolute inset-0 bg-white/90 backdrop-blur-md rounded-[3rem] flex flex-col items-center justify-center gap-6 z-20 shadow-2xl">
                                            <div className="w-20 h-20 border-8 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                            <p className="font-black text-indigo-600 text-3xl animate-pulse">正在製作檔案，請稍候...</p>
                                        </div>
                                    )}
                                </div>

                                {/* 提示標籤 */}
                                <div className="flex flex-wrap justify-center gap-4">
                                    {['A4 比例輸出', '高清高品質', '電腦/手機通用'].map(tag => (
                                        <span key={tag} className="px-6 py-2 bg-white/50 border-2 border-white rounded-full text-base font-black text-slate-500 shadow-sm">{tag}</span>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="text-center max-w-lg space-y-10 animate-in fade-in zoom-in duration-700">
                                <div className="w-40 h-40 bg-white rounded-[4rem] shadow-2xl shadow-indigo-100 flex items-center justify-center text-indigo-600 mx-auto transform -rotate-6 hover:rotate-0 transition-transform">
                                    <Icon name="puzzlePiece" size={80} />
                                </div>
                                <div className="space-y-4">
                                    <h2 className="text-4xl md:text-5xl font-black tracking-tight text-slate-900">歡迎使用<br/><span className="text-indigo-600">自製拼圖產生器</span></h2>
                                    <p className="text-slate-500 text-xl md:text-2xl font-bold leading-relaxed">
                                        只要簡單三步驟，<br/>即可製作專屬的拼圖練習教材。
                                    </p>
                                </div>
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="bg-indigo-600 text-white px-12 py-7 rounded-[2.5rem] font-black text-2xl shadow-2xl shadow-indigo-200 hover:bg-indigo-700 hover:scale-110 active:scale-95 transition-all flex items-center gap-4 mx-auto"
                                >
                                    選取檔案開始製作 <Icon name="arrowRight" size={28} />
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
