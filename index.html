<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自製拼圖產生器 - 鄭凱文職能治療師設計</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
        }

        /* 電腦版固定視窗 */
        @media (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; }
        }

        /* 手機版允許捲動 */
        @media (max-width: 1024px) {
            body { overflow-y: auto; overflow-x: hidden; } 
        }

        .custom-shadow {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        input[type="range"] {
            height: 12px;
            -webkit-appearance: none;
            background: #cbd5e1;
            border-radius: 10px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: all 0.2s;
        }

        .sidebar-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                puzzle: <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />,
                puzzlePiece: <path d="M11.75 5.25c.7-.7 1.8-.7 2.5 0l2 2c.7.7.7 1.8 0 2.5l-1 1c-.7.7-.7 1.8 0 2.5l3 3c.7.7.7 1.8 0 2.5l-2 2c-.7.7-1.8.7-2.5 0l-3-3c-.7-.7-1.8-.7-2.5 0l-1 1c-.7.7-1.8.7-2.5 0l-2-2c-.7-.7-.7-1.8 0-2.5l1-1c.7-.7.7-1.8 0-2.5l-3-3c-.7-.7-.7-1.8 0-2.5l2-2c.7-.7 1.8-.7 2.5 0l3 3c.7.7 1.8.7 2.5 0l1-1z" />,
                image: <path d="M5 19l4.58-4.59a2 2 0 012.83 0L17 19M11 11a2 2 0 100-4 2 2 0 000 4zM19 5H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2V7a2 2 0 00-2-2z" />,
                upload: <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
                refresh: <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />,
                download: <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" />,
                arrowRight: <path d="M5 12h14M12 5l7 7-7 7" />,
                trash: <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />,
                chevronDown: <path d="M6 9l6 6 6-6" />,
                chevronUp: <path d="M18 15l-6-6-6 6" />,
                chevronLeft: <path d="M15 18l-6-6 6-6" />,
                chevronRight: <path d="M9 18l6-6-6-6" />,
                file: <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zM14 2v6h6" />,
                external: <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" />
            };

            return (
                <div className={`inline-flex items-center justify-center flex-shrink-0 ${className}`} style={{ width: size, height: size }}>
                    <svg
                        width="100%"
                        height="100%"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        strokeWidth="2.5"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        style={{ overflow: 'visible', padding: '1px' }}
                    >
                        {icons[name] || icons.puzzle}
                    </svg>
                </div>
            );
        };

        const App = () => {
            const [image, setImage] = useState(null);
            const [rows, setRows] = useState(3);
            const [cols, setCols] = useState(4);
            const [lineWidth, setLineWidth] = useState(4);
            const [style, setStyle] = useState('irregular'); 
            const [previewTab, setPreviewTab] = useState('puzzle'); 
            const [isExporting, setIsExporting] = useState(false);
            const [isJsPdfLoaded, setIsJsPdfLoaded] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(true);
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            const [randomSeed, setRandomSeed] = useState(Math.random());
            const [canvasSize, setCanvasSize] = useState({ width: 800, height: 600 });

            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const script = document.createElement('script');
                script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
                script.async = true;
                script.onload = () => setIsJsPdfLoaded(true);
                document.body.appendChild(script);
            }, []);

            const updateDimensions = useCallback((img) => {
                if (!img) return;
                const container = document.getElementById('main-container');
                if (!container) return;
                
                const isMobile = window.innerWidth < 1024;
                const availableW = container.clientWidth - 32;
                const availableH = isMobile ? window.innerHeight * 0.45 : container.clientHeight - 160; 
                
                const ratio = img.height / img.width;
                let finalW = availableW;
                let finalH = finalW * ratio;

                if (finalH > availableH) {
                    finalH = availableH;
                    finalW = finalH / ratio;
                }

                setCanvasSize({ width: finalW, height: finalH });
            }, []);

            useEffect(() => {
                const timer = setTimeout(() => updateDimensions(image), 150);
                const handleResize = () => updateDimensions(image);
                window.addEventListener('resize', handleResize);
                return () => {
                    clearTimeout(timer);
                    window.removeEventListener('resize', handleResize);
                };
            }, [image, updateDimensions, isSidebarCollapsed]);

            const handleUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const img = new Image();
                        img.onload = () => {
                            setImage(img);
                            updateDimensions(img);
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            const points = useMemo(() => {
                const pts = [];
                const jitter = style === 'irregular' ? 0.35 : 0;
                for (let i = 0; i <= rows; i++) {
                    pts[i] = [];
                    for (let j = 0; j <= cols; j++) {
                        let x = j / cols;
                        let y = i / rows;
                        const getNoise = (a, b, off) => {
                            const v = Math.sin(a * 12.9898 + b * 78.233 + (randomSeed + off) * 43758.5453);
                            return v - Math.floor(v);
                        };
                        if (style === 'irregular') {
                            if (i > 0 && i < rows && j > 0 && j < cols) {
                                x += (getNoise(i, j, 0) - 0.5) * (jitter / cols);
                                y += (getNoise(j, i, 0.5) - 0.5) * (jitter / rows);
                            } else if (i === 0 || i === rows) {
                                if (j > 0 && j < cols) x += (getNoise(i, j, 0.2) - 0.5) * (jitter * 0.5 / cols);
                            } else if (j === 0 || j === cols) {
                                if (i > 0 && i < rows) y += (getNoise(j, i, 0.7) - 0.5) * (jitter * 0.5 / rows);
                            }
                        }
                        pts[i][j] = { x, y };
                    }
                }
                return pts;
            }, [rows, cols, style, randomSeed]);

            const draw = useCallback((ctx, w, h, mode, scale = 1) => {
                ctx.clearRect(0, 0, w, h);
                const isGuide = mode === 'guide';
                if (!isGuide && image) {
                    ctx.drawImage(image, 0, 0, w, h);
                } else {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, w, h);
                }
                
                const visualCompensator = scale > 1 ? 1.2 : 1; 
                ctx.strokeStyle = isGuide ? '#94a3b8' : '#000000';
                ctx.lineWidth = lineWidth * scale * visualCompensator;
                
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                for (let i = 0; i <= rows; i++) {
                    for (let j = 0; j <= cols; j++) {
                        if (j < cols) {
                            ctx.moveTo(points[i][j].x * w, points[i][j].y * h);
                            ctx.lineTo(points[i][j+1].x * w, points[i][j+1].y * h);
                        }
                        if (i < rows) {
                            ctx.moveTo(points[i][j].x * w, points[i][j].y * h);
                            ctx.lineTo(points[i+1][j].x * w, points[i+1][j].y * h);
                        }
                    }
                }
                ctx.stroke();
                
                // 修正：外框四邊一致，不使用預設的 strokeRect 以免被邊緣裁切
                ctx.strokeStyle = '#000000';
                const outerLineWidth = (lineWidth * 1.5) * scale * visualCompensator;
                ctx.lineWidth = outerLineWidth;
                // 內縮半個線寬繪製矩形，確保線條完整出現在畫布內
                ctx.strokeRect(outerLineWidth / 2, outerLineWidth / 2, w - outerLineWidth, h - outerLineWidth);
            }, [image, points, lineWidth, rows, cols]);

            useEffect(() => {
                if (canvasRef.current && image) {
                    const ctx = canvasRef.current.getContext('2d');
                    draw(ctx, canvasSize.width, canvasSize.height, previewTab, 1);
                }
            }, [image, canvasSize, previewTab, draw]);

            const exportPDF = async (mode) => {
                if (!image || !isJsPdfLoaded) return;
                setIsExporting(true);
                const isMobile = window.innerWidth < 768;
                const q = isMobile ? 1.8 : 3.0;

                setTimeout(() => {
                    try {
                        const { jsPDF } = window.jspdf;
                        const orientation = image.width > image.height ? 'l' : 'p';
                        const pdf = new jsPDF(orientation, 'mm', 'a4');
                        const pw = pdf.internal.pageSize.getWidth();
                        const ph = pdf.internal.pageSize.getHeight();
                        const margin = 12;
                        
                        const drawPage = (type, titleText) => {
                            const temp = document.createElement('canvas');
                            // 修正：標題區高度與字體大小顯著放大
                            const titleHeightPx = 100 * q; 
                            const borderBuffer = (lineWidth * 2) * q; // 增加畫布緩衝區確保邊框不被裁切
                            
                            temp.width = (image.width * q) + (borderBuffer * 2);
                            temp.height = (image.height * q) + titleHeightPx + (borderBuffer * 2);
                            
                            const tctx = temp.getContext('2d');
                            tctx.fillStyle = '#ffffff';
                            tctx.fillRect(0, 0, temp.width, temp.height);
                            
                            // 修正：標題字體放大至 32 * q
                            tctx.fillStyle = '#000000';
                            tctx.font = `bold ${32 * q}px "Noto Sans TC", sans-serif`;
                            tctx.textAlign = 'center';
                            tctx.textBaseline = 'middle';
                            tctx.fillText(titleText, temp.width / 2, titleHeightPx / 2);
                            
                            tctx.save();
                            // 平移到內容區起點，並預留邊界空間
                            tctx.translate(borderBuffer, titleHeightPx + borderBuffer);
                            draw(tctx, image.width * q, image.height * q, type, q);
                            tctx.restore();
                            
                            const pdfAvailableW = pw - margin * 2;
                            const pdfAvailableH = ph - margin * 2;
                            const ratio = Math.min(pdfAvailableW / temp.width, pdfAvailableH / temp.height);
                            
                            const finalW = temp.width * ratio;
                            const finalH = temp.height * ratio;
                            
                            pdf.addImage(temp.toDataURL('image/jpeg', 0.9), 'JPEG', (pw - finalW) / 2, (ph - finalH) / 2, finalW, finalH);
                        };

                        if (mode === 'both' || mode === 'puzzle') {
                            drawPage('puzzle', '第一頁：拼圖訓練頁面');
                            if (mode === 'both') pdf.addPage();
                        }
                        if (mode === 'both' || mode === 'guide') {
                            drawPage('guide', '第二頁：引導底圖頁面');
                        }
                        pdf.save(`自製拼圖_${cols}x${rows}_${Date.now()}.pdf`);
                    } catch (e) { console.error(e); } finally { setIsExporting(false); }
                }, 200);
            };

            return (
                <div className="lg:h-screen flex flex-col lg:flex-row bg-slate-50 overflow-x-hidden">
                    
                    <header className="lg:hidden bg-white px-6 py-4 border-b border-slate-200 flex items-center gap-3 sticky top-0 z-30 shadow-sm">
                        <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white">
                            <Icon name="puzzlePiece" size={24} />
                        </div>
                        <h1 className="font-black text-xl text-slate-800">自製拼圖產生器</h1>
                    </header>

                    <main id="main-container" className="flex-1 p-4 lg:p-8 flex flex-col items-center justify-start lg:justify-center relative bg-slate-50 order-1 lg:order-2 overflow-hidden">
                        {image ? (
                            <div className="w-full h-full flex flex-col items-center justify-start lg:justify-center animate-in fade-in duration-500">
                                <div className="bg-white/90 backdrop-blur-sm p-1.5 rounded-2xl flex shadow-md border border-white w-full max-w-xs mb-6 z-10">
                                    <button onClick={() => setPreviewTab('puzzle')} className={`flex-1 py-3 rounded-xl text-lg font-black transition-all ${previewTab === 'puzzle' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}>拼圖預覽</button>
                                    <button onClick={() => setPreviewTab('guide')} className={`flex-1 py-3 rounded-xl text-lg font-black transition-all ${previewTab === 'guide' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}>引導底圖</button>
                                </div>
                                
                                <div className="relative flex items-center justify-center w-full min-h-0">
                                    <div className="bg-white p-3 lg:p-4 rounded-[2.5rem] custom-shadow border-[8px] lg:border-[12px] border-white transition-all transform">
                                        <canvas 
                                            ref={canvasRef} 
                                            width={canvasSize.width} 
                                            height={canvasSize.height}
                                            className="rounded-xl block mx-auto max-w-full h-auto shadow-inner"
                                        />
                                    </div>
                                    
                                    {isExporting && (
                                        <div className="absolute inset-0 bg-white/95 backdrop-blur-md rounded-[2.5rem] flex flex-col items-center justify-center gap-6 z-20 shadow-2xl">
                                            <div className="w-16 h-16 border-6 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                            <p className="font-black text-indigo-600 text-2xl animate-pulse text-center px-4 leading-relaxed">正在製作高清檔案<br/>線條校準中，請稍候...</p>
                                        </div>
                                    )}
                                </div>

                                <div className="mt-4 flex gap-4 text-[10px] lg:text-xs font-bold text-slate-400 uppercase tracking-widest">
                                    <span>A4 Print Ready</span>
                                    <span>•</span>
                                    <span>Calibration: Active</span>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center max-md py-12 lg:py-0 space-y-10 px-6 animate-in zoom-in duration-500">
                                <div className="w-32 h-32 bg-white rounded-[3rem] shadow-xl flex items-center justify-center text-indigo-600 mx-auto transform -rotate-3">
                                    <Icon name="puzzlePiece" size={64} />
                                </div>
                                <div className="space-y-4">
                                    <h2 className="text-3xl lg:text-4xl font-black tracking-tight text-slate-900 leading-tight">歡迎使用<br/><span className="text-indigo-600">自製拼圖產生器</span></h2>
                                    <p className="text-slate-500 text-lg lg:text-xl font-bold leading-relaxed">
                                        上傳照片，快速製作專屬教材。
                                    </p>
                                </div>
                                <button onClick={() => fileInputRef.current.click()} className="bg-indigo-600 text-white px-10 py-5 rounded-[2rem] font-black text-xl lg:text-2xl shadow-xl hover:bg-indigo-700 transition-all flex items-center gap-4 mx-auto active:scale-95 shadow-indigo-200">
                                    選取檔案開始製作 <Icon name="arrowRight" size={28} />
                                </button>
                            </div>
                        )}
                    </main>

                    <aside className={`sidebar-transition relative bg-white border-t lg:border-t-0 lg:border-r border-slate-200 flex flex-col z-20 shadow-xl order-2 lg:order-1
                        ${isSidebarCollapsed ? 'lg:w-0 lg:translate-x-0 overflow-hidden' : 'w-full lg:w-[28rem] lg:h-screen'}`}>
                        
                        <div className="flex-1 overflow-y-auto custom-scrollbar no-scrollbar lg:block">
                            <div className="p-6 lg:p-8 space-y-10">
                                <header className="hidden lg:flex items-center gap-4">
                                    <div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                                        <Icon name="puzzlePiece" size={32} />
                                    </div>
                                    <h1 className="font-black text-2xl md:text-3xl tracking-tight text-slate-800">自製拼圖產生器</h1>
                                </header>

                                <section className="space-y-4 bg-slate-50/50 p-5 rounded-3xl border border-slate-100">
                                    <div className="flex items-center justify-between">
                                        <label className="text-xl font-black text-slate-700 flex items-center gap-2">
                                            <span className="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-sm font-black">1</span>
                                            選取訓練圖片
                                        </label>
                                        {image && (
                                            <button onClick={() => setImage(null)} className="text-red-500 font-bold flex items-center gap-1 hover:bg-red-50 px-3 py-1.5 rounded-xl transition-all">
                                                <Icon name="trash" size={20} /> 清除
                                            </button>
                                        )}
                                    </div>
                                    {!image ? (
                                        <div onClick={() => fileInputRef.current.click()} className="border-4 border-dashed border-slate-200 rounded-2xl p-8 flex flex-col items-center justify-center gap-3 cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition-all active:scale-95 bg-white">
                                            <Icon name="upload" size={40} className="text-slate-300" />
                                            <span className="text-xl text-slate-500 font-black">點擊選取照片檔案</span>
                                        </div>
                                    ) : (
                                        <div className="relative group rounded-2xl overflow-hidden shadow-md border-2 border-white h-28 lg:h-32">
                                            <img src={image.src} className="w-full h-full object-cover" />
                                            <div className="absolute inset-0 bg-black/60 opacity-0 lg:group-hover:opacity-100 flex items-center justify-center transition-all">
                                                <button onClick={() => fileInputRef.current.click()} className="bg-white text-slate-900 font-black px-6 py-2 rounded-full text-lg shadow-lg">更換圖片</button>
                                            </div>
                                        </div>
                                    )}
                                    <input ref={fileInputRef} type="file" className="hidden" accept="image/*" onChange={handleUpload} />
                                </section>

                                <section className="bg-white rounded-[2rem] border-2 border-slate-100 overflow-hidden shadow-sm">
                                    <button onClick={() => setIsSettingsOpen(!isSettingsOpen)} className="w-full p-6 flex items-center justify-between hover:bg-slate-50 transition-colors">
                                        <div className="flex items-center gap-2">
                                            <span className="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-sm font-black">2</span>
                                            <span className="text-xl font-black text-slate-700">設定切割細節</span>
                                        </div>
                                        <Icon name={isSettingsOpen ? "chevronUp" : "chevronDown"} size={24} className="text-slate-400" />
                                    </button>
                                    
                                    {isSettingsOpen && (
                                        <div className="p-6 pt-0 space-y-10 animate-in slide-in-from-top duration-300">
                                            <div className="flex p-1.5 bg-slate-50 rounded-2xl border border-slate-200">
                                                <button onClick={() => setStyle('grid')} className={`flex-1 py-4 text-xl font-black rounded-xl transition-all ${style === 'grid' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'}`}>標準網格</button>
                                                <button onClick={() => setStyle('irregular')} className={`flex-1 py-4 text-xl font-black rounded-xl transition-all ${style === 'irregular' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'}`}>隨機斜線</button>
                                            </div>

                                            <div className="space-y-10">
                                                <div className="space-y-5">
                                                    <div className="flex justify-between items-end"><span className="text-xl font-black text-slate-500">橫向切割片數</span><span className="text-4xl font-black text-indigo-600 leading-none">{cols}</span></div>
                                                    <input type="range" min="1" max="10" value={cols} onChange={e => setCols(parseInt(e.target.value))} className="w-full h-4" />
                                                </div>
                                                <div className="space-y-5">
                                                    <div className="flex justify-between items-end"><span className="text-xl font-black text-slate-500">縱向切割片數</span><span className="text-4xl font-black text-indigo-600 leading-none">{rows}</span></div>
                                                    <input type="range" min="1" max="10" value={rows} onChange={e => setRows(parseInt(e.target.value))} className="w-full h-4" />
                                                </div>
                                                <div className="space-y-5">
                                                    <div className="flex justify-between items-end"><span className="text-xl font-black text-slate-500">切割線條粗細</span><span className="text-3xl font-black text-indigo-600 leading-none">{lineWidth}px</span></div>
                                                    <input type="range" min="1" max="20" value={lineWidth} onChange={e => setLineWidth(parseInt(e.target.value))} className="w-full h-4" />
                                                </div>
                                                <button onClick={() => setRandomSeed(Math.random())} className="w-full py-5 bg-indigo-50 border-2 border-indigo-100 rounded-2xl text-indigo-600 font-black text-xl flex items-center justify-center gap-2 hover:bg-indigo-100 transition-all active:scale-95 shadow-sm">
                                                    <Icon name="refresh" size={24} /> 換一種隨機切割樣式
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </section>

                                <div className="space-y-6 pt-2 pb-16 lg:pb-8">
                                    <label className="text-xl font-black text-slate-700 flex items-center gap-2">
                                        <span className="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-sm font-black">3</span>
                                        完成並列印下載
                                    </label>
                                    <button 
                                        disabled={!image || isExporting} 
                                        onClick={() => exportPDF('both')} 
                                        className="w-full bg-slate-900 text-white py-6 rounded-[2.5rem] font-black text-2xl flex items-center justify-center gap-3 hover:bg-black active:scale-95 disabled:opacity-30 transition-all shadow-2xl touch-manipulation shadow-slate-200"
                                    >
                                        <Icon name="file" size={32} /> 下載完整 A4 PDF
                                    </button>
                                    <div className="grid grid-cols-2 gap-4">
                                        <button 
                                            disabled={!image || isExporting} 
                                            onClick={() => exportPDF('puzzle')} 
                                            className="bg-white border-4 border-slate-100 text-slate-700 py-6 rounded-3xl font-black text-xl hover:bg-slate-50 transition-all disabled:opacity-50 active:scale-95 shadow-sm touch-manipulation"
                                        >
                                            單印拼圖
                                        </button>
                                        <button 
                                            disabled={!image || isExporting} 
                                            onClick={() => exportPDF('guide')} 
                                            className="bg-white border-4 border-slate-100 text-slate-700 py-6 rounded-3xl font-black text-xl hover:bg-slate-50 transition-all disabled:opacity-50 active:scale-95 shadow-sm touch-manipulation"
                                        >
                                            單印底圖
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <footer className="p-8 bg-slate-50 border-t border-slate-100 text-center">
                            <p className="text-lg font-bold text-slate-500 leading-relaxed">
                                設計：<a href="https://www.facebook.com/mpotkevin" target="_blank" className="text-indigo-600 hover:underline inline-flex items-center gap-1">職能治療師 - 鄭凱文 <Icon name="external" size={16}/></a>
                            </p>
                        </footer>
                    </aside>

                    <button 
                        onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)}
                        className="hidden lg:flex absolute top-1/2 -translate-y-1/2 bg-white border-y border-r border-slate-200 p-2 rounded-r-2xl shadow-xl z-40 hover:bg-indigo-600 hover:text-white transition-all sidebar-transition"
                        style={{ left: isSidebarCollapsed ? '0' : '28.1rem' }}
                    >
                        <Icon name={isSidebarCollapsed ? "chevronRight" : "chevronLeft"} size={32} />
                    </button>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
